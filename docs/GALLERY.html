<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIGC 工程作品集 · ComfyUI Pipeline</title>
  <style>
    :root { --bg: #0f1115; --card: #1a1d24; --text: #e8eaed; --muted: #9aa0a6; --accent: #6ea8fe; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    header { padding: 2rem 1.5rem; text-align: center; border-bottom: 1px solid #2a2f3a; }
    header h1 { margin: 0 0 0.5rem; font-size: 1.6rem; }
    header p { margin: 0.35rem 0; color: var(--muted); font-size: 0.95rem; }
    header a { color: var(--accent); }
    .note { max-width: 720px; margin: 1rem auto 0; padding: 0.75rem 1rem; background: #1e2430; border-radius: 8px; font-size: 0.85rem; color: var(--muted); }
    .grid-hero { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; }
    .grid-hero img { width: 100%; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
    main { max-width: 1100px; margin: 0 auto; padding: 1rem 1rem 3rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
    figure { margin: 0; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2a2f3a; }
    figure img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
    figcaption { padding: 0.75rem 1rem; font-size: 0.85rem; color: var(--muted); }
    footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.8rem; border-top: 1px solid #2a2f3a; }
  </style>
</head>
<body>
  <header>
    <h1>AIGC 工程化 · ComfyUI 管线</h1>
    <p>Python 编排 · REST API 批处理 · Ollama 提示词 · LoRA / IPAdapter 工作流</p>
    <p class="note">本页仅展示 <strong>ComfyUI 工作流与节点配置</strong>（技术向），不含成图样张。完整出图能力可在面试时本地演示。</p>
    <p><a href="https://github.com/kisaragiy/aigc-comfy-pipeline">GitHub 仓库</a> ·
       <a href="https://github.com/kisaragiy">kisaragiy</a></p>
  </header>
  <div class="grid-hero">
    <img src="samples/00_gallery_grid.jpg" alt="工作流拼图" />
  </div>
  <main id="gallery"></main>
  <footer>工程能力展示 · 张伟强 2025–2026</footer>
  <script>
    const items = [
      ["01_flux_klein_workflow.jpg", "Flux.2 + Klein 身份一致性工作流"],
      ["02_multi_node_pipeline.jpg", "多节点 AIGC 管线总览"],
      ["03_identity_guidance.jpg", "身份引导 / 单图工作流"],
      ["04_img2img_swap.jpg", "图生图 / 局部重绘流程"],
      ["05_ipadapter_blend.jpg", "IPAdapter 参考图融合"],
      ["06_lora_txt2img_setup.jpg", "SDXL LoRA 文生图节点配置"],
      ["07_lora_img2img_setup.jpg", "LoRA + 图生图编排"],
    ];
    const root = document.getElementById("gallery");
    items.forEach(([file, cap]) => {
      const fig = document.createElement("figure");
      fig.innerHTML = `<img src="samples/${file}" alt="${cap}" loading="lazy" /><figcaption>${cap}</figcaption>`;
      root.appendChild(fig);
    });
  </script>
</body>
</html>
